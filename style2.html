<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinar elementos html</title>
    <style>
        h1,h2,h3, h4,h5 {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-size: 40px;
            text-align: start;
            letter-spacing: 10px;
        }
        h2{
            font-size: 30px;
            text-align: center;
            letter-spacing: 5px;
        }
        h3{
            font-size: 25px;
            text-align: end;
            letter-spacing: 4px;
        }
        h4{
            font-size: 20px;
            text-align: center;
            letter-spacing: 3px;
        }
        h5{
            font-size: 15px;
            text-align: end;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
  <h1>Sin censura.</h1>
  <h2>Sin censura.</h2> 
  <h3>Sin censura.</h3>
  <h4>Sin censura.</h4>
  <h5>Sin censura.</h5>
</body>
</html>
