<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERENCIA DE ESTILOS</title>
<style>
body{
    color: blue;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
}
em{
    color: rgb(13, 238, 13);
}
p{
    color: rgb(219, 18, 18) ;
}
</style>  
</head>
<body>
    <h1>HERENCIA DE ESTILOS CON <em>andrea</em> </h1>
    <p>Este es un párrafo de ejemplo para demostrar 
        la herencia de estilos en CSS, el color y la 
        fuente se aplican automáticamente a este texto 
        debido a la herencia desde el elementos body. </p> 
</body>  
</body>
</html>
